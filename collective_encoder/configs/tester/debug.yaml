# Debug configuration for collective-encoder
# These values override the main config when --debug is set

nepochs: 2
nexp: 0
outfolder: "debug_tester"
overwrite: true
wandb: False
output_to_file: True
nogpu: True

datamodule_args:
  max_frames: 14
  sequential: true
  train_size: 10
  batch_size: 2
  validation_size: 4
  val_batch_size: 2
  test_full_dataset: True
  num_workers: 1
