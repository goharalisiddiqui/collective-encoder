# Example configuration for Alanine Dipeptide (Ala2) molecular dynamics
# This example demonstrates dimensionality reduction of molecular conformations

# =============================================================================
# TRAINING SETTINGS
# =============================================================================
debug: False                   # Set to True for quick testing (2 epochs, small dataset)
nepochs: 50                    # Number of training epochs
lrate: 0.001                   # Learning rate
weight_decay: 0.0001           # L2 regularization
scheduler: True                # Use learning rate scheduling
nogpu: False                   # Set to True to force CPU-only training
early_stopping: False          # Enable early stopping based on validation loss

# =============================================================================
# OUTPUT SETTINGS
# =============================================================================
outpath: ./results             # Directory to save results
outfolder: ala2_vae            # Subdirectory name for this experiment
nexp: 1                        # Experiment number (for multiple runs)
overwrite: True                # Overwrite existing results
output_to_file: True           # Save training logs to file
save_checkpoint: True          # Save model checkpoints
wandb: False                   # Set to True for Weights & Biases tracking

# =============================================================================
# NETWORK ARCHITECTURE
# =============================================================================
network_name: VAE              # Network type: VAE, AE, DVAE, EDVAE, etc.
network_args:
    network: [128, 64, 2]      # Encoder layers: input -> 128 -> 64 -> 2D latent
    beta: 1.0                  # VAE beta parameter (KL divergence weight)
    batch_norm: True           # Use batch normalization

# =============================================================================
# DATA CONFIGURATION
# =============================================================================
data_name: XTC                 # Data type: XTC (GROMACS trajectory)
data_args:
    # Input files
    tprfile: ./data/ala2.tpr   # GROMACS topology file
    xtcfile: ./data/ala2.xtc   # GROMACS trajectory file

    # Atom selection (all heavy atoms, no hydrogens, no solvent)
    selection: "(resname ALA or resname ACE or resname NME) and not element H"

    # Dataset parameters
    mac_frames: 1000           # Number of frames to use from trajectory
    sequential: False          # Random sampling (True for sequential frames)

    # Train/validation split
    train_size: 800           # Number of training frames
    validation_size: 200      # Number of validation frames
    batch_size: 32            # Training batch size
    val_batch_size: 64        # Validation batch size
    test_full_dataset: True   # Use full dataset for testing (True)

    # Feature representation
    dataset_type: "DISTANCES"  # Feature type: DISTANCES, POSITIONS, SOAP
    dataset_args:
        group1: "0:22"         # First group of atoms for distance calculation
        group2: "0:22"         # Second group of atoms for distance calculation

    # Data processing
    num_workers: 4            # Number of parallel data loading workers
    norm_type: "minmax"       # Normalization: minmax, standard, none

    # Labels (optional - for monitoring specific collective variables)
    labeler_type: "DihedralValueLabeler"     
    labeler_args:
        label_dihedrals: 
            - phi_2
            - psi_2