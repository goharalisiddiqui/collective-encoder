debug: False
outpath: ./train_runs
outfolder: run
overwrite: True
nexp: 1
output_to_file: True
save_checkpoint: False
save_serial_model: False
# output_traj: True
# load_model: <path_to_model>

# Trainer Settings
nepochs: 1000
weight_decay: 0.0
nogpu: False
export_latent: False
wandb: False
wandb_project: None
wandb_entity: None
scheduler: True
lrate: 0.001

data_name: XTC
data_args:
    tprfile: ./examples/ala2_tutorial/data/ala2.tpr
    xtcfile: ./examples/ala2_tutorial/data/ala2.xtc
    selection: "(resname ALA or resname ACE or resname NME) and not element H"
    max_frames: 150
    sequential: False
    train_size : 80
    batch_size : 8
    validation_size : 20
    val_batch_size : 5
    dataset_type : "DISTANCES"
    num_workers : 4
    norm_type : "minmax"
    labeler_type: "DIHEDRAL"
    labeler_args:
      label_dihedrals: 
        - phi_2
        - psi_2

network_name: VAE
network_args:
    network: [256, 64, 3]
    beta: 1.0
    batch_norm: True


